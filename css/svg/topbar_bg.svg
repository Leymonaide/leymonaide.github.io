<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="6" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
    </filter>
    <defs>
        <pattern id="bg" patternUnits="userSpaceOnUse" height="100%" width="1500px">
            <rect filter="url(#noiseFilter)" height="100%" width="1500px" opacity="6%"/>
        </pattern>
    </defs>
    <rect height="100%" width="100%" fill="url(#bg)"/>
</svg>